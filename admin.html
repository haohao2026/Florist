<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rosery · 後台管理</title>
<link rel="stylesheet" href="tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap">
<style>
  :root {
    --page-bg:    var(--ivory);
    --page-bg-2:  #FBF7F0;
    --surface:    #FFFFFF;
    --ink-text:   var(--ink-deepest);
    --ink-text-2: var(--moss);
    --ink-text-3: var(--stem);
    --line:       rgba(26,38,34,0.12);
    --line-strong:rgba(26,38,34,0.28);
    --rose-accent:var(--rose);
    --font-display-cjk: "Playfair Display","Noto Serif TC","Songti TC",serif;
    --font-body-cjk:    "Montserrat","Noto Sans TC","PingFang TC",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--page-bg);color:var(--ink-text);font-family:var(--font-body-cjk);font-weight:300;-webkit-font-smoothing:antialiased;line-height:1.6}
  a{color:inherit;text-decoration:none}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font:inherit}

  /* ── Login ── */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--page-bg);
  }
  .login-box{
    width:100%;max-width:400px;padding:48px 40px;
    background:var(--surface);border:1px solid var(--line);
  }
  .login-logo{
    text-align:center;margin-bottom:32px;
  }
  .login-logo .mark{
    font-family:var(--font-display-cjk);font-size:26px;font-weight:500;
    letter-spacing:0.32em;padding-left:0.32em;
  }
  .login-logo .tag{
    display:block;font-size:11px;letter-spacing:0.28em;
    color:var(--ink-text-2);margin-top:4px;text-transform:uppercase;
  }
  .login-box h2{
    font-family:var(--font-display-cjk);font-weight:400;font-size:22px;
    text-align:center;margin:0 0 32px;color:var(--ink-text-2);
  }
  .field{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
  .field label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-text-2)}
  .field input,.field select,.field textarea{
    border:none;border-bottom:1px solid var(--line-strong);
    background:transparent;padding:10px 0 12px;font-size:15px;color:var(--ink-text);
    border-radius:0;outline:none;transition:border-color .2s;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-bottom-color:var(--ink-text)}
  .field textarea{resize:vertical;min-height:80px}
  .btn-primary{
    width:100%;height:52px;background:var(--ink-text);color:var(--ivory);
    font-size:12px;letter-spacing:0.1em;text-transform:uppercase;
    transition:background .2s;
  }
  .btn-primary:hover{background:var(--rose-accent)}
  .login-error{
    color:#c0392b;font-size:13px;text-align:center;margin-bottom:16px;display:none;
  }

  /* ── App shell ── */
  #app{display:none}

  .topbar{
    position:sticky;top:0;z-index:50;
    background:rgba(245,240,232,0.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .topbar__inner{
    max-width:1400px;margin:0 auto;padding:0 32px;
    display:flex;align-items:center;height:68px;gap:32px;
  }
  .topbar__logo .mark{
    font-family:var(--font-display-cjk);font-size:20px;font-weight:500;
    letter-spacing:0.32em;padding-left:0.32em;
  }
  .topbar__logo .badge{
    font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--ink-text-2);margin-left:10px;
  }
  .topbar__tabs{display:flex;gap:0;margin-left:auto}
  .tab-btn{
    padding:8px 20px;font-size:11px;font-weight:500;
    letter-spacing:0.1em;text-transform:uppercase;
    border-bottom:2px solid transparent;color:var(--ink-text-2);
    transition:color .2s,border-color .2s;
  }
  .tab-btn.is-active{color:var(--ink-text);border-bottom-color:var(--ink-text)}
  .topbar__logout{
    margin-left:24px;font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--ink-text-3);padding:6px 14px;
    border:1px solid var(--line-strong);transition:background .2s;
  }
  .topbar__logout:hover{background:rgba(26,38,34,0.06)}

  /* ── Main content ── */
  .main{max-width:1400px;margin:0 auto;padding:40px 32px}

  /* ── Section head ── */
  .section-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:32px;
  }
  .section-head h2{
    font-family:var(--font-display-cjk);font-size:28px;font-weight:400;
    letter-spacing:-0.01em;margin:0;
  }
  .btn-add{
    display:inline-flex;align-items:center;gap:8px;
    height:44px;padding:0 20px;
    background:var(--ink-text);color:var(--ivory);
    font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    transition:background .2s;
  }
  .btn-add:hover{background:var(--rose-accent)}

  /* ── Product grid ── */
  .product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:24px;
  }
  .product-card{
    background:var(--surface);border:1px solid var(--line);overflow:hidden;
  }
  .product-card__img{
    aspect-ratio:4/3;background:var(--page-bg-2);overflow:hidden;
  }
  .product-card__img img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .6s;
  }
  .product-card:hover .product-card__img img{transform:scale(1.04)}
  .product-card__body{padding:16px}
  .product-card__name{
    font-family:var(--font-display-cjk);font-size:17px;font-weight:400;
    margin:0 0 4px;
  }
  .product-card__desc{font-size:12px;color:var(--ink-text-3);margin:0 0 8px}
  .product-card__row{
    display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  }
  .product-card__price{
    font-size:13px;letter-spacing:0.06em;color:var(--ink-text-2);
  }
  .badge-tag{
    display:inline-block;
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--ivory);background:var(--rose-accent);padding:2px 8px;
    font-family:"Cormorant Garamond","Noto Serif TC",serif;font-style:italic;
  }
  .btn-del{
    font-size:11px;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--ink-text-3);padding:4px 10px;
    border:1px solid var(--line);transition:background .15s,color .15s;
  }
  .btn-del:hover{background:var(--rose-accent);color:var(--ivory);border-color:var(--rose-accent)}

  /* ── Add product modal ── */
  .modal-overlay{
    position:fixed;inset:0;z-index:100;
    background:rgba(19,28,25,0.45);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .modal-overlay.is-open{opacity:1;pointer-events:auto}
  .modal{
    background:var(--surface);border:1px solid var(--line);
    width:100%;max-width:540px;padding:40px;
    transform:translateY(16px);transition:transform .25s;
    max-height:90vh;overflow-y:auto;
  }
  .modal-overlay.is-open .modal{transform:translateY(0)}
  .modal__head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:28px;
  }
  .modal__title{
    font-family:var(--font-display-cjk);font-size:22px;font-weight:400;margin:0;
  }
  .modal__close{
    width:32px;height:32px;border:1px solid var(--line-strong);border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .modal__close:hover{background:rgba(26,38,34,0.08)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 16px}
  .form-grid .full{grid-column:1/-1}
  .modal__actions{margin-top:28px;display:flex;gap:12px;justify-content:flex-end}
  .btn-cancel{
    padding:0 20px;height:44px;border:1px solid var(--line-strong);
    font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--ink-text-2);transition:background .15s;
  }
  .btn-cancel:hover{background:rgba(26,38,34,0.06)}
  .btn-save{
    padding:0 24px;height:44px;background:var(--ink-text);color:var(--ivory);
    font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    transition:background .2s;
  }
  .btn-save:hover{background:var(--rose-accent)}

  /* ── Orders table ── */
  .orders-table-wrap{overflow-x:auto}
  .orders-table{
    width:100%;border-collapse:collapse;font-size:14px;
  }
  .orders-table th{
    text-align:left;font-size:10px;font-weight:500;
    letter-spacing:0.12em;text-transform:uppercase;
    color:var(--ink-text-2);
    border-bottom:1px solid var(--line-strong);
    padding:12px 16px;white-space:nowrap;
  }
  .orders-table td{
    padding:14px 16px;border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .orders-table tr:last-child td{border-bottom:none}
  .orders-table tr:hover td{background:rgba(26,38,34,0.02)}
  .order-id{
    font-size:11px;color:var(--ink-text-3);letter-spacing:0.06em;
    font-family:monospace;
  }
  .order-type{
    display:inline-block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
    padding:2px 8px;border:1px solid var(--line-strong);color:var(--ink-text-2);
  }
  .order-type.cart{background:rgba(26,38,34,0.06)}
  .order-type.bespoke{background:rgba(140,37,48,0.08);border-color:rgba(140,37,48,0.25);color:var(--rose-accent)}
  .status-badge{
    display:inline-block;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
    padding:3px 10px;
  }
  .status-badge.pending{background:#FFF3CD;color:#856404}
  .status-badge.done{background:#D1E7DD;color:#0A5236}
  .status-badge.cancel{background:#F8D7DA;color:#842029}
  .order-items{font-size:12px;color:var(--ink-text-2);line-height:1.6;max-width:260px}

  /* ── Stats bar ── */
  .stats{display:flex;gap:24px;margin-bottom:36px;flex-wrap:wrap}
  .stat{
    flex:1;min-width:160px;background:var(--surface);border:1px solid var(--line);
    padding:20px 24px;
  }
  .stat__label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-text-2);margin-bottom:8px}
  .stat__val{font-family:var(--font-display-cjk);font-size:32px;font-weight:400}

  /* ── Empty state ── */
  .empty{
    text-align:center;padding:80px 0;color:var(--ink-text-3);
    font-family:"Cormorant Garamond","Noto Serif TC",serif;font-style:italic;font-size:18px;
  }
  .empty span{
    display:block;font-style:normal;font-family:var(--font-body-cjk);
    font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
    margin-top:10px;
  }

  /* ── Toast ── */
  .toast{
    position:fixed;left:50%;bottom:32px;
    transform:translateX(-50%) translateY(16px);
    background:var(--ink-text);color:var(--ivory);
    padding:12px 20px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    z-index:200;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;
  }
  .toast.is-on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:720px){
    .topbar__inner{padding:0 16px;gap:16px}
    .topbar__logo .badge{display:none}
    .main{padding:24px 16px}
    .product-grid{grid-template-columns:1fr 1fr}
    .form-grid{grid-template-columns:1fr}
    .form-grid .full{grid-column:1}
    .stats{flex-direction:column}
  }

  /* ── Upload drop zone ── */
  .upload-drop{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;min-height:120px;padding:24px 16px;
    border:1px dashed var(--line-strong);text-align:center;
    cursor:pointer;position:relative;
    transition:background .2s,border-color .2s;
  }
  .upload-drop:hover{background:rgba(26,38,34,0.03);border-color:var(--ink-text)}
  .upload-drop.is-drag{background:rgba(140,37,48,0.04);border-color:var(--rose-accent)}
  .upload-drop.is-uploading{opacity:.65;pointer-events:none}
  .upload-drop.has-preview{padding:0;min-height:160px;overflow:hidden}
  .upload-drop.has-preview .upload-placeholder{display:none}
  .upload-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--ink-text-2)}
  .upload-placeholder .up-icon{color:var(--ink-text-3)}
  .upload-placeholder span{font-size:13px}
  .upload-placeholder small{font-size:11px;letter-spacing:0.06em;color:var(--ink-text-3)}
  .upload-status{
    position:absolute;inset:0;display:none;
    align-items:center;justify-content:center;
    background:rgba(245,240,232,0.88);
    font-size:12px;letter-spacing:0.08em;color:var(--ink-text-2);
  }
  .upload-drop.is-uploading .upload-status{display:flex}
  #img-preview{width:100%;max-height:220px;object-fit:cover;display:none}
  .upload-drop.has-preview #img-preview{display:block}
  .upload-or{
    text-align:center;font-size:11px;letter-spacing:0.08em;
    color:var(--ink-text-3);margin:10px 0 4px;text-transform:uppercase;
  }
</style>
</head>
<body>

<!-- ── Login ── -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="mark">ROSERY</div>
      <span class="tag">花房誌 · 後台管理</span>
    </div>
    <h2>登入</h2>
    <p class="login-error" id="login-error">密碼錯誤，請再試一次</p>
    <div class="field">
      <label for="pwd-input">管理員密碼</label>
      <input type="password" id="pwd-input" placeholder="請輸入密碼" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn">登入 →</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__logo">
        <span class="mark">ROSERY</span>
        <span class="badge">管理後台</span>
      </div>
      <div class="topbar__tabs">
        <button class="tab-btn is-active" data-tab="products">產品管理</button>
        <button class="tab-btn" data-tab="orders">訂單列表</button>
      </div>
      <button class="topbar__logout" id="logout-btn">登出</button>
    </div>
  </header>

  <main class="main">
    <!-- Products Tab -->
    <div id="tab-products">
      <div class="section-head">
        <h2>產品管理</h2>
        <button class="btn-add" id="open-add-modal">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          新增產品
        </button>
      </div>
      <div class="product-grid" id="product-grid">
        <div class="empty">載入中…<span>Loading</span></div>
      </div>
    </div>

    <!-- Orders Tab -->
    <div id="tab-orders" style="display:none">
      <div class="section-head">
        <h2>訂單列表</h2>
      </div>
      <div class="stats" id="stats-bar"></div>
      <div class="orders-table-wrap">
        <table class="orders-table">
          <thead>
            <tr>
              <th>訂單編號</th>
              <th>日期</th>
              <th>姓名</th>
              <th>聯絡方式</th>
              <th>類型</th>
              <th>金額 / 預算</th>
              <th>內容摘要</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="8"><div class="empty">載入中…<span>Loading</span></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ── Add Product Modal ── -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal__head">
      <h3 class="modal__title">新增產品</h3>
      <button class="modal__close" id="close-add-modal">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <form id="add-form" novalidate>
      <div class="form-grid">
        <div class="field full">
          <label for="p-name">產品名稱 <span style="color:var(--rose-accent)">*</span></label>
          <input id="p-name" type="text" placeholder="例：春朝・粉牡丹" required>
        </div>
        <div class="field full">
          <label for="p-desc">產品描述</label>
          <input id="p-desc" type="text" placeholder="例：粉牡丹 · 銀蓮花 · 尤加利">
        </div>
        <div class="field">
          <label for="p-price">售價（NT$）<span style="color:var(--rose-accent)">*</span></label>
          <input id="p-price" type="number" min="1" placeholder="1880" required>
        </div>
        <div class="field">
          <label for="p-tag">標籤（選填）</label>
          <select id="p-tag">
            <option value="">無</option>
            <option value="New">New</option>
            <option value="Bestseller">Bestseller</option>
            <option value="Limited">Limited</option>
            <option value="Sale">Sale</option>
          </select>
        </div>
        <div class="field full">
          <label>產品圖片</label>
          <label class="upload-drop" id="upload-area">
            <input type="file" id="p-img-file" accept="image/*" style="display:none">
            <img id="img-preview" alt="圖片預覽">
            <div class="upload-placeholder">
              <svg class="up-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>點擊或拖曳上傳圖片</span>
              <small>JPG · PNG · WebP · 最大 5 MB</small>
            </div>
            <div class="upload-status">上傳中…</div>
          </label>
          <div class="upload-or">— 或貼上圖片網址 —</div>
          <input id="p-img" type="url" placeholder="https://images.unsplash.com/...">
        </div>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn-cancel" id="close-add-modal-2">取消</button>
        <button type="submit" class="btn-save" id="save-product-btn">儲存產品 →</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let adminPassword = '';

  // ── Auth ──
  function getStoredPwd() { return sessionStorage.getItem('rosery_admin_pwd') || ''; }
  function storePwd(p) { sessionStorage.setItem('rosery_admin_pwd', p); }
  function clearPwd() { sessionStorage.removeItem('rosery_admin_pwd'); }

  async function tryLogin(pwd) {
    const res = await fetch(API + '/api/orders', {
      headers: { 'x-admin-password': pwd }
    });
    return res.ok;
  }

  // ── Init ──
  (async () => {
    const stored = getStoredPwd();
    if (stored && await tryLogin(stored)) {
      adminPassword = stored;
      showApp();
    }
  })();

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const pwd = document.getElementById('pwd-input').value.trim();
    if (!pwd) return;
    const ok = await tryLogin(pwd);
    if (ok) {
      adminPassword = pwd;
      storePwd(pwd);
      document.getElementById('login-error').style.display = 'none';
      showApp();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
    clearPwd();
    adminPassword = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('pwd-input').value = '';
  });

  function showApp() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProducts();
  }

  // ── Tabs ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      const tab = btn.dataset.tab;
      document.getElementById('tab-products').style.display = tab === 'products' ? 'block' : 'none';
      document.getElementById('tab-orders').style.display = tab === 'orders' ? 'block' : 'none';
      if (tab === 'orders') loadOrders();
    });
  });

  // ── Products ──
  async function loadProducts() {
    const res = await fetch(API + '/api/products');
    const products = await res.json();
    renderProductGrid(products);
  }

  function renderProductGrid(products) {
    const grid = document.getElementById('product-grid');
    if (!products.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1">尚無產品<span>No products yet</span></div>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="product-card" data-id="${p.id}">
        <div class="product-card__img">
          <img src="${p.img || ''}" alt="${p.name}"
            onerror="this.style.display='none';this.parentNode.style.background='linear-gradient(135deg,#EDD6D5,#8C2530)'">
        </div>
        <div class="product-card__body">
          ${p.tag ? `<span class="badge-tag">${p.tag}</span>` : ''}
          <div class="product-card__name">${p.name}</div>
          <div class="product-card__desc">${p.desc || ''}</div>
          <div class="product-card__row">
            <span class="product-card__price">NT$ ${Number(p.price).toLocaleString()}</span>
            <button class="btn-del" data-del="${p.id}">刪除</button>
          </div>
        </div>
      </div>
    `).join('');

    grid.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm(`確定要刪除「${btn.closest('[data-id]').querySelector('.product-card__name').textContent}」嗎？`)) return;
        const id = btn.dataset.del;
        await fetch(`${API}/api/products?id=${encodeURIComponent(id)}`, {
          method: 'DELETE',
          headers: { 'x-admin-password': adminPassword }
        });
        showToast('產品已刪除');
        loadProducts();
      });
    });
  }

  // ── Add Product Modal ──
  const addModal = document.getElementById('add-modal');
  document.getElementById('open-add-modal').addEventListener('click', () => addModal.classList.add('is-open'));
  document.getElementById('close-add-modal').addEventListener('click', () => addModal.classList.remove('is-open'));
  document.getElementById('close-add-modal-2').addEventListener('click', () => addModal.classList.remove('is-open'));
  addModal.addEventListener('click', e => { if (e.target === addModal) addModal.classList.remove('is-open'); });

  // Reset upload area when modal closes
  function closeAddModal() {
    addModal.classList.remove('is-open');
    resetUpload();
  }
  document.getElementById('close-add-modal').addEventListener('click', closeAddModal);
  document.getElementById('close-add-modal-2').addEventListener('click', closeAddModal);

  // ── Image upload ──
  const uploadArea    = document.getElementById('upload-area');
  const fileInput     = document.getElementById('p-img-file');
  const imgPreview    = document.getElementById('img-preview');
  const uploadPH      = uploadArea.querySelector('.upload-placeholder');

  function resetUpload() {
    imgPreview.src = '';
    imgPreview.style.display = 'none';
    uploadPH.style.display = 'flex';
    uploadArea.classList.remove('has-preview', 'is-uploading', 'is-drag');
    fileInput.value = '';
    document.getElementById('p-img').value = '';
  }

  uploadArea.addEventListener('click', e => {
    if (e.target === fileInput) return;
    fileInput.click();
  });
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('is-drag'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('is-drag'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('is-drag');
    const file = e.dataTransfer.files[0];
    if (file?.type.startsWith('image/')) handleFileSelect(file);
  });
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) handleFileSelect(file);
  });

  async function handleFileSelect(file) {
    // Instant local preview
    const reader = new FileReader();
    reader.onload = ev => {
      imgPreview.src = ev.target.result;
      imgPreview.style.display = 'block';
      uploadArea.classList.add('has-preview');
    };
    reader.readAsDataURL(file);

    // Upload to backend
    uploadArea.classList.add('is-uploading');
    try {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'x-admin-password': adminPassword },
        body: fd,
      });
      const data = await res.json();
      if (data.url) {
        document.getElementById('p-img').value = data.url;
      } else {
        showToast(data.error || '圖片上傳失敗');
      }
    } catch {
      showToast('圖片上傳失敗，請再試一次');
    } finally {
      uploadArea.classList.remove('is-uploading');
    }
  }

  document.getElementById('add-form').addEventListener('submit', async e => {
    e.preventDefault();
    const name = document.getElementById('p-name').value.trim();
    const price = document.getElementById('p-price').value.trim();
    if (!name || !price) { showToast('請填寫名稱與售價'); return; }

    const btn = document.getElementById('save-product-btn');
    btn.textContent = '儲存中…';
    btn.disabled = true;

    try {
      const res = await fetch(API + '/api/products', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-password': adminPassword
        },
        body: JSON.stringify({
          name,
          desc: document.getElementById('p-desc').value.trim(),
          price: Number(price),
          img: document.getElementById('p-img').value.trim(),
          tag: document.getElementById('p-tag').value || null,
        })
      });
      if (!res.ok) throw new Error();
      addModal.classList.remove('is-open');
      document.getElementById('add-form').reset();
      resetUpload();
      showToast('產品已新增 ✿');
      loadProducts();
    } catch {
      showToast('新增失敗，請再試一次');
    } finally {
      btn.textContent = '儲存產品 →';
      btn.disabled = false;
    }
  });

  // ── Orders ──
  async function loadOrders() {
    const tbody = document.getElementById('orders-tbody');
    tbody.innerHTML = '<tr><td colspan="8"><div class="empty">載入中…</div></td></tr>';
    try {
      const res = await fetch(API + '/api/orders', {
        headers: { 'x-admin-password': adminPassword }
      });
      const orders = await res.json();
      renderStats(orders);
      renderOrders(orders);
    } catch {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty">載入失敗<span>Please try again</span></div></td></tr>';
    }
  }

  function renderStats(orders) {
    const total = orders.length;
    const pending = orders.filter(o => o.status === '待確認').length;
    const thisMonth = orders.filter(o => {
      const d = new Date(o.createdAt);
      const now = new Date();
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }).length;
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat"><div class="stat__label">總訂單</div><div class="stat__val">${total}</div></div>
      <div class="stat"><div class="stat__label">待確認</div><div class="stat__val">${pending}</div></div>
      <div class="stat"><div class="stat__label">本月新單</div><div class="stat__val">${thisMonth}</div></div>
    `;
  }

  const PALETTE_NAMES = { rose:'玫瑰紅', blush:'蜜桃粉', ivory:'純白', green:'森綠', lavender:'薰衣草', mixed:'綜合' };
  const TYPE_NAMES = { cart:'購物車', bespoke:'客製訂花' };

  function renderOrders(orders) {
    const tbody = document.getElementById('orders-tbody');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty">尚無訂單<span>No orders yet</span></div></td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => {
      const date = new Date(o.createdAt).toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      const statusCls = o.status === '待確認' ? 'pending' : o.status === '已完成' ? 'done' : 'cancel';
      const typeLabel = TYPE_NAMES[o.type] || o.type;
      const typeCls = o.type === 'cart' ? 'cart' : 'bespoke';

      let summary = '';
      if (o.type === 'cart' && o.items?.length) {
        summary = o.items.map(i => `${i.name} ×${i.qty}`).join('<br>');
        if (o.address) summary += `<br><small style="color:var(--ink-text-3)">📦 ${o.address}</small>`;
      } else {
        const parts = [];
        if (o.occasion) parts.push(o.occasion);
        if (o.palette) parts.push(PALETTE_NAMES[o.palette] || o.palette);
        if (o.date) parts.push(o.date);
        if (o.note) parts.push(`「${o.note}」`);
        summary = parts.join(' · ');
      }

      const amount = o.total ? `NT$ ${Number(o.total).toLocaleString()}` : (o.budget ? `NT$ ${Number(o.budget).toLocaleString()}` : '—');

      return `
        <tr>
          <td><span class="order-id">${o.id}</span></td>
          <td style="white-space:nowrap;font-size:12px">${date}</td>
          <td><strong>${o.name || '—'}</strong></td>
          <td style="font-size:13px">${o.contact || '—'}</td>
          <td><span class="order-type ${typeCls}">${typeLabel}</span></td>
          <td style="white-space:nowrap;font-size:13px">${amount}</td>
          <td><div class="order-items">${summary || '—'}</div></td>
          <td><span class="status-badge ${statusCls}">${o.status}</span></td>
        </tr>
      `;
    }).join('');
  }

  // ── Toast ──
  const toastEl = document.getElementById('toast');
  let toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('is-on');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('is-on'), 2000);
  }
</script>
</body>
</html>
